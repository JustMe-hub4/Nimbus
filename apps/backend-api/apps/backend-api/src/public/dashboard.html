<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimbus Platform — Live Telemetry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0a0a0a; 
    color: #fff; 
    font-family: 'Courier New', monospace;
    padding: 20px;
  }
  header {
    border-bottom: 1px solid #333;
    padding-bottom: 20px;
    margin-bottom: 30px;
  }
  h1 { font-size: 24px; color: #00ff88; }
  .subtitle { color: #666; font-size: 12px; margin-top: 4px; }
  .status { 
    display: inline-block;
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .card {
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    padding: 20px;
  }
  .card-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }
  .card-value { font-size: 48px; font-weight: bold; margin: 10px 0; }
  .card-unit { color: #666; font-size: 14px; }
  .temp-value { color: #ff6b6b; }
  .humidity-value { color: #4ecdc4; }
  .time-value { color: #00ff88; font-size: 14px; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    text-align: left;
    padding: 10px;
    color: #666;
    border-bottom: 1px solid #222;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 11px;
  }
  td {
    padding: 10px;
    border-bottom: 1px solid #111;
  }
  tr:hover { background: #111; }
  .section-title {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 15px;
  }
</style>
</head>
<body>
<header>
  <h1><span class="status"></span>NIMBUS PLATFORM</h1>
  <div class="subtitle">Environmental Intelligence — Live Telemetry Feed</div>
</header>

<div class="grid">
  <div class="card">
    <div class="card-label">Temperature</div>
    <div class="card-value temp-value" id="temp">--</div>
    <div class="card-unit">°C</div>
  </div>
  <div class="card">
    <div class="card-label">Humidity</div>
    <div class="card-value humidity-value" id="humidity">--</div>
    <div class="card-unit">%</div>
  </div>
  <div class="card">
    <div class="card-label">Device</div>
    <div class="card-value" style="font-size:20px;margin-top:20px" id="device">--</div>
    <div class="card-unit">active</div>
  </div>
  <div class="card">
    <div class="card-label">Last Updated</div>
    <div class="time-value" style="margin-top:20px;font-size:13px" id="lastUpdated">--</div>
    <div class="card-unit" style="margin-top:8px">auto-refreshes every 5s</div>
  </div>
</div>

<div class="section-title">Recent Readings</div>
<table>
  <thead>
    <tr>
      <th>Time</th>
      <th>Device</th>
      <th>Temperature (°C)</th>
      <th>Humidity (%)</th>
    </tr>
  </thead>
  <tbody id="readings"></tbody>
</table>

<script>
async function fetchTelemetry() {
  try {
    const res = await fetch('/api/v1/telemetry/latest');
    const json = await res.json();
    
    if (json.data && json.data.length > 0) {
      const latest = json.data[0];
      
      document.getElementById('temp').textContent = latest.temperature;
      document.getElementById('humidity').textContent = latest.humidity;
      document.getElementById('device').textContent = latest.device_id;
      document.getElementById('lastUpdated').textContent = 
        new Date(latest.time).toLocaleTimeString();
      
      const tbody = document.getElementById('readings');
      tbody.innerHTML = json.data.map(row => `
        <tr>
          <td>${new Date(row.time).toLocaleTimeString()}</td>
          <td>${row.device_id}</td>
          <td style="color:#ff6b6b">${row.temperature}</td>
          <td style="color:#4ecdc4">${row.humidity}</td>
        </tr>
      `).join('');
    }
  } catch(e) {
    console.error('Failed to fetch telemetry:', e);
  }
}

fetchTelemetry();
setInterval(fetchTelemetry, 5000);
</script>
</body>
</html>
