version: '3.9'
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: nimbus-postgres
    environment:
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus_dev_password
      POSTGRES_DB: nimbus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimbus"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nimbus-network

  redis:
    image: redis:7-alpine
    container_name: nimbus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nimbus-network

  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: nimbus-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/broker/version", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nimbus-network

  adminer:
    image: adminer:latest
    container_name: nimbus-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - nimbus-network

  mqtt-consumer:
    image: python:3.11-slim
    container_name: nimbus-mqtt-consumer
    working_dir: /app
    volumes:
      - ./mqtt_consumer.py:/app/mqtt_consumer.py
    command: >
      sh -c "pip install paho-mqtt psycopg2-binary -q &&
             python mqtt_consumer.py"
    environment:
      DB_HOST: postgres
      MQTT_HOST: mosquitto
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - nimbus-network
    restart: unless-stopped

  virtual-device:
    image: python:3.11-slim
    container_name: nimbus-virtual-device
    working_dir: /app
    volumes:
      - ./virtual_device.py:/app/virtual_device.py
    command: >
      sh -c "pip install paho-mqtt -q &&
             python virtual_device.py"
    environment:
      MQTT_HOST: mosquitto
    depends_on:
      - mosquitto
    networks:
      - nimbus-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  nimbus-network:
    driver: bridge
